[advisories]
version = 2
# RUSTSEC-2024-0436: `paste` is unmaintained (archived, no successor release).
# Pulled in transitively, compile-time-only (proc-macro) via
# tokenizers -> macro_rules_attribute -> paste; no runtime attack surface and
# no alternative version to upgrade to. Re-evaluate when tokenizers drops it.
ignore = ["RUSTSEC-2024-0436"]

[licenses]
version = 2
allow = ["Apache-2.0", "MIT", "Unicode-3.0", "BSD-3-Clause", "ISC", "Zlib"]

[bans]
multiple-versions = "warn"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
