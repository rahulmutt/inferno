[tools]
# CAUTION: Editing this file invalidates GitHub Actions tool cache (jdx/mise-action),
# forcing the five cargo-backend tools (nextest, audit, deny, insta, fuzz) to rebuild
# from source (~10 min next CI run, then self-heals). Rust components rustfmt/clippy
# are additionally guarded in .github/workflows/ci.yml (cache misses ~/.rustup).
"cargo:cargo-nextest" = "0.9.138"
rust = { version = "1.96.0", components = "rustfmt,clippy" }
"cargo:cargo-audit" = "0.22.2"
"cargo:cargo-deny" = "0.19.9"
"cargo:cargo-insta" = "1.48.0"
gitleaks = "8.30.1"
lefthook = "2.1.9"
"cargo:cargo-fuzz" = "0.13.2"

[env]
CARGO_TERM_COLOR = "always"

[tasks.test]
description = "Blocking-tier tests (fast; what PR CI runs)"
run = "cargo nextest run --workspace --no-tests=pass"

[tasks.test-full]
description = "Full test suite incl. ignored/slow tests"
run = "cargo nextest run --workspace --run-ignored all"

[tasks.lint]
description = "Format check + clippy (deny warnings)"
run = [
  "cargo fmt --all --check",
  "cargo clippy --workspace --all-targets -- -D warnings",
]

[tasks.fmt]
description = "Auto-format"
run = "cargo fmt --all"

[tasks.audit]
description = "Supply-chain gate: RustSec advisories + cargo-deny policy"
run = ["cargo audit", "cargo deny check advisories bans sources licenses"]

# In sandboxes with restricted ptrace (ptrace_scope=2, Docker default seccomp),
# LeakSanitizer's exit-time check faults and libFuzzer reports a spurious
# empty-input crash — run with ASAN_OPTIONS=detect_leaks=0 there. Real crashes
# have non-empty artifacts.
[tasks.fuzz]
description = "Run one fuzz target briefly (nightly rustc): mise run fuzz -- gguf_parse"
run = "mise exec rust@nightly -- cargo fuzz run --fuzz-dir fuzz {{arg(name='target')}} -- -max_total_time=60"

[tasks.differential]
description = "Nightly teacher-forced differential vs llama.cpp (downloads a real model; run inside devenv shell)"
run = "bash scripts/nightly-differential.sh"

[tasks.speedup]
description = "Nightly M3 gate: compiled decode tok/s vs interpreter, asserted by MARGIN (downloads a real model, first-compiles it; run inside devenv shell)"
run = "bash scripts/nightly-speedup.sh"

[tasks.bench-kernels]
description = "Kernel µbenches vs pinned ggml (run inside devenv shell, on quiet hardware)"
run = "cargo bench -p inferno-kernels --features ggml-compare"
