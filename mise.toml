[tools]
# CAUTION: Editing this file invalidates GitHub Actions tool cache (jdx/mise-action),
# forcing the five cargo-backend tools (nextest, audit, deny, insta, fuzz) to rebuild
# from source (~10 min next CI run, then self-heals). Rust components rustfmt/clippy
# are additionally guarded in .github/workflows/ci.yml (cache misses ~/.rustup).
"cargo:cargo-nextest" = "0.9.140"
rust = { version = "1.97.1", components = "rustfmt,clippy" }
"cargo:cargo-audit" = "0.22.2"
"cargo:cargo-deny" = "0.20.2"
"cargo:cargo-insta" = "1.48.0"
gitleaks = "8.30.1"
lefthook = "2.1.10"
"cargo:cargo-fuzz" = "0.13.2"
"aqua:loft-sh/devpod" = "0.6.15"

[env]
CARGO_TERM_COLOR = "always"

[tasks.test]
description = "Blocking-tier tests (fast; what PR CI runs)"
run = [
  "cargo nextest run --workspace --no-tests=pass",
  "cargo nextest run -p inferno-pool --features pool-profile --no-tests=pass",
]

[tasks.test-full]
description = "Full test suite incl. ignored/slow tests"
run = "cargo nextest run --workspace --run-ignored all"

[tasks.lint]
description = "Format check + clippy (deny warnings)"
run = [
  "cargo fmt --all --check",
  "cargo clippy --workspace --all-targets -- -D warnings",
  "cargo clippy -p inferno-pool --features pool-profile --all-targets -- -D warnings",
]

[tasks.fmt]
description = "Auto-format"
run = "cargo fmt --all"

[tasks.audit]
description = "Supply-chain gate: RustSec advisories + cargo-deny policy"
run = ["cargo audit", "cargo deny check advisories bans sources licenses"]

# In sandboxes with restricted ptrace (ptrace_scope=2, Docker default seccomp),
# LeakSanitizer's exit-time check faults and libFuzzer reports a spurious
# empty-input crash — run with ASAN_OPTIONS=detect_leaks=0 there. Real crashes
# have non-empty artifacts.
[tasks.fuzz]
description = "Run one fuzz target briefly (nightly rustc): mise run fuzz -- gguf_parse"
run = "mise exec rust@nightly -- cargo fuzz run --fuzz-dir fuzz {{arg(name='target')}} -- -max_total_time=60"

[tasks.differential]
description = "Nightly teacher-forced differential vs llama.cpp (downloads a real model; run inside devenv shell)"
run = "bash scripts/nightly-differential.sh"

[tasks.speedup]
description = "Nightly M3 gate: compiled decode tok/s vs interpreter, asserted by MARGIN (downloads a real model, first-compiles it; run inside devenv shell)"
run = "bash scripts/nightly-speedup.sh"

[tasks.semgrep]
description = "Nightly SAST scan (semgrep p/rust, minus the blanket unsafe rule); needs semgrep on PATH or the semgrep/semgrep container"
run = "sh scripts/semgrep.sh"

[tasks.bench-kernels]
description = "Kernel µbenches vs pinned ggml (run inside devenv shell, on quiet hardware)"
run = "cargo bench -p inferno-kernels --features ggml-compare"

[tasks.bench]
description = "inferno vs llama.cpp comparison (M4a protocol: run inside devenv shell, quiet hardware; record data points in the current milestone spec's Amendments (M4b.6: docs/superpowers/specs/2026-07-09-m4b6-decode-gemv-op-reduction-design.md)): mise run bench -- <model.gguf>"
run = "cargo run --release -p inferno -- bench"

[tasks.verify-quiet-hw]
description = "M4b.7 quiet-hardware verification pass: fitness preflight + the five deferred-verdict gates (run inside devenv shell on quiet hardware; --smoke = plumbing check on any box; see docs/runbooks/quiet-hw-verification.md): mise run verify-quiet-hw -- <model.gguf> [--smoke]"
run = "bash scripts/quiet-hw/verify.sh"

[tasks.metal]
description = "Provision a PhoenixNAP box, run a workload, collect results, auto-deprovision (spec: docs/superpowers/specs/2026-07-10-phoenixnap-bench-infra-design.md; runbook: docs/runbooks/metal.md): mise run metal -- <type> [--yes|--keep|--reuse ID] -- '<workload>'"
run = "bash scripts/metal/run.sh"

[tasks.metal-catalog]
description = "List PhoenixNAP server types with CPU model, ISA flags (AVX2/AVX-512/...), $/hr, availability"
run = "bash scripts/metal/catalog.sh"

[tasks.metal-probe]
description = "Ask a server type what silicon it actually is: provision, read /proc/cpuinfo, print a cpu-features.json entry, deprovision (no devpod — minutes and cents). The products API is not a source of truth; four of its CPU model numbers name no real part: mise run metal-probe -- <type> [--yes]"
run = "bash scripts/metal/probe.sh"

[tasks.metal-gc]
description = "List + delete stray inferno-metal servers (run after any interrupted metal session)"
run = "bash scripts/metal/gc.sh"

[tasks.metal-selftest]
description = "Offline metal tooling selftest (no network, no credentials): API retry/backoff, catalog join, host-prep drift, gc tag match, arg parsing"
run = "bash scripts/metal/lib-selftest.sh"

[tasks.metal-record-fixtures]
description = "Re-record scripts/metal/fixtures/ from the live PhoenixNAP API (needs PNAP_CLIENT_ID/SECRET; read-only, free). Diff the result, then re-run metal-selftest"
run = "bash scripts/metal/record-fixtures.sh"
