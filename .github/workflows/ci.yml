name: ci
on:
  push:
    branches: [main]
  pull_request:

# Blocking tier — budget ≤ 5 min wall-clock (spec §Testing).
# M3 note: inferno-codegen/inferno-core link llvm-sys (inkwell), so any
# `cargo test --workspace` now needs LLVM 18. LLVM is provided by the devenv
# shell (devenv.nix pins llvmPackages_18), so the workspace build/test/lint
# steps run inside `devenv shell --`. FlakeHub Cache keeps the LLVM nix
# closure off GitHub's 10 GB Actions-cache budget so it can't evict rust-cache.
jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  check:
    runs-on: ubuntu-latest
    permissions:
      id-token: write # FlakeHub Cache OIDC auth
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@v16
      - uses: DeterminateSystems/flakehub-cache-action@v3
      - run: nix profile install nixpkgs#devenv
      - uses: jdx/mise-action@v2 # installs mise.toml pins, incl. rust
      # mise-action's GH Actions cache only spans ~/.local/share/mise, not the
      # rustup-managed toolchain dir — a cache-hit run can restore rustc/cargo
      # but drop the rustfmt/clippy components. Idempotent no-op when present.
      - run: rustup component add rustfmt clippy
      - uses: Swatinem/rust-cache@v2
      - run: devenv shell -- mise run lint
      - run: devenv shell -- mise run test
      # audit (cargo-deny/cargo-audit) resolves metadata only — no crate
      # compilation, so it needs no LLVM and stays outside the devenv shell.
      - run: mise run audit
