name: nightly
on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  fuzz:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target: [gguf_parse, safetensors_parse]
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v2
      - uses: Swatinem/rust-cache@v2
      - run: mise exec rust@nightly -- rustc --version
      - run: mise exec rust@nightly -- cargo fuzz run --fuzz-dir fuzz ${{ matrix.target }} -- -max_total_time=600
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: fuzz-crashes-${{ matrix.target }}
          path: fuzz/artifacts/

  semgrep:
    runs-on: ubuntu-latest
    container: semgrep/semgrep
    steps:
      - uses: actions/checkout@v4
      # Command lives in scripts/semgrep.sh so `mise run semgrep` matches CI
      # (excludes the blanket unsafe-usage rule — see the script for why).
      - run: sh scripts/semgrep.sh

  mutants:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v2
      - uses: Swatinem/rust-cache@v2
      - run: mise use --pin "cargo:cargo-mutants@latest" && mise install
      - run: cargo mutants --package inferno-formats --timeout 60 --in-place
        continue-on-error: true # advisory: audits assertion strength, doesn't gate

  # Nightly-fresh supply-chain scan (new CVEs land on old code).
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v2
      - run: mise run audit

  # Onboarding-you-can-actually-run: the README quickstart from a bare clone.
  # M3 requires LLVM (inferno-codegen/core link llvm-sys), so the workspace
  # build/test/run steps run inside `devenv shell --`.
  onboarding:
    runs-on: ubuntu-latest
    permissions:
      id-token: write # FlakeHub Cache OIDC auth
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@v16
      - uses: DeterminateSystems/flakehub-cache-action@v3
      - run: nix profile install nixpkgs#devenv
      - uses: jdx/mise-action@v2
      - uses: Swatinem/rust-cache@v2
      - run: devenv shell -- bash -c 'llvm-config --version && command -v llama-cli'
      - run: devenv shell -- mise run test
      - run: devenv shell -- cargo run -p inferno -- inspect crates/inferno-formats/tests/fixtures/tiny.gguf

  # Teacher-forced greedy differential vs the devenv-pinned llama.cpp on a
  # real quantized model (M1 spec §Nightly tier).
  differential:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      id-token: write # FlakeHub Cache OIDC auth
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@v16
      - uses: DeterminateSystems/flakehub-cache-action@v3
      - run: nix profile install nixpkgs#devenv
      - uses: jdx/mise-action@v2
      - uses: Swatinem/rust-cache@v2
      - uses: actions/cache@v4
        with:
          path: ~/.cache/inferno-tests
          key: inferno-test-models-qwen25-05b-v1
      - run: devenv shell -- mise run differential

  # M3 "faster than the interpreter" gate (spec §Testing, Task 17): compiles
  # the pinned model and asserts compiled decode tok/s clears
  # `cli/src/bench.rs::MARGIN` times the interpreter's, on the same real
  # quantized model the `differential` job downloads (same cache dir/key —
  # `scripts/fetch-qwen-gguf.sh` is shared by both). Kept out of the blocking
  # PR tier: model download + first LLVM compile blow the 5-min budget.
  speedup:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      id-token: write # FlakeHub Cache OIDC auth
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@v16
      - uses: DeterminateSystems/flakehub-cache-action@v3
      - run: nix profile install nixpkgs#devenv
      - uses: jdx/mise-action@v2
      - uses: Swatinem/rust-cache@v2
      - uses: actions/cache@v4
        with:
          path: ~/.cache/inferno-tests
          key: inferno-test-models-qwen25-05b-v1
      - run: devenv shell -- mise run speedup

  # Full suite incl. ignored/slow tests, with enlarged property-test runs.
  # M3 requires LLVM (inferno-codegen/core link llvm-sys) → runs in devenv.
  test-full:
    runs-on: ubuntu-latest
    permissions:
      id-token: write # FlakeHub Cache OIDC auth
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@v16
      - uses: DeterminateSystems/flakehub-cache-action@v3
      - run: nix profile install nixpkgs#devenv
      - uses: jdx/mise-action@v2
      - uses: Swatinem/rust-cache@v2
      - run: devenv shell -- mise run test-full
        env:
          PROPTEST_CASES: "1024"
